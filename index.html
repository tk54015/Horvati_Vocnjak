<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventar Stabala</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div class="map-controls">
      <button id="zoom-in">+</button>
      <button id="zoom-out">-</button>
    </div>
    <!-- icon-picker privremeno sakriven
    <div id="icon-picker">
      <span>Odaberi:</span>
      <img src="icons/apple.png" class="icon-option" data-icon="icons/apple.png" title="Jabuka">
      <img src="icons/pear.png" class="icon-option" data-icon="icons/pear.png" title="Kruška">
      <img src="icons/peach.png" class="icon-option" data-icon="icons/peach.png" title="Breskva">
      <img src="icons/download.png" class="icon-option" data-icon="icons/download.png" title="Ostalo">
    </div>
    -->
    <div id="tree-type-picker">
      <label for="tree-type">Vrsta stabla:</label>
      <select id="tree-type">
        <option value="jabuka">Jabuka</option>
        <option value="kruska">Kruška</option>
        <option value="sljiva">Šljiva</option>
        <option value="smokva">Smokva</option>
        <option value="breskva">Breskva</option>
        <option value="glog">Glog</option>
        <option value="drenak">Drenak</option>
        <option value="kupina">Kupina</option>
        <option value="ribizl">Ribizl</option>
        <option value="vinova_loza">Vinova loza</option>
      </select>
      <button id="export-json" type="button">Preuzmi JSON</button>
      <button id="preview-json" type="button">Prikazi JSON u sredini</button>
      <button id="toggle-drag" type="button" class="drag-locked">🔒 Markeri zaključani</button>
      <small>Sve novo ostaje spremljeno nakon refresha.</small>
    </div>
    <div id="plant-panel">
      <b>Podaci o biljci</b>
      <div id="plant-empty">Klikni marker za otvaranje podataka.</div>
      <div id="plant-form" class="hidden">
        <div class="plant-meta"><span>ID:</span><strong id="plant-id">-</strong></div>
        <div class="plant-meta"><span>Vrsta:</span><strong id="plant-type">-</strong></div>
        <div class="plant-meta"><span>Koordinate:</span><strong id="plant-coords">-</strong></div>

        <label for="status-orezano">Orezano</label>
        <select id="status-orezano">
          <option value="nepoznato">Nepoznato</option>
          <option value="da">Da</option>
          <option value="ne">Ne</option>
        </select>

        <label for="status-gnojeno">Gnojeno</label>
        <select id="status-gnojeno">
          <option value="nepoznato">Nepoznato</option>
          <option value="da">Da</option>
          <option value="ne">Ne</option>
        </select>

        <label for="status-spricano">Spricano (komentari)</label>
        <textarea id="status-spricano" rows="4" placeholder="Primjer: da, modro ulje 4.3.2025"></textarea>

        <label for="status-napomena">Napomena</label>
        <input id="status-napomena" type="text" readonly placeholder="Klikni ovdje za unos napomene" />

        <button id="save-plant-status" type="button">Spremi podatke biljke</button>
      </div>
    </div>

    <div id="json-modal" class="hidden" role="dialog" aria-modal="true" aria-label="JSON pregled">
      <div class="json-modal-card">
        <div class="json-modal-header">
          <b>Pregled JSON podataka</b>
          <button id="close-json-modal" type="button">Zatvori</button>
        </div>
        <pre id="json-preview-content"></pre>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
